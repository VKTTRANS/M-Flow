<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M-Flow System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .slip-preview { max-width: 100%; max-height: 400px; object-fit: contain; border: 1px solid #ddd; border-radius: 8px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="container py-5">
    
    <div id="loginSection" class="card shadow-sm p-4 mx-auto" style="max-width: 400px;">
        <h3 class="text-center mb-4">เข้าสู่ระบบ</h3>
        <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" id="username" class="form-control">
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control">
        </div>
        <button class="btn btn-primary w-100" onclick="doLogin()">เข้าสู่ระบบ</button>
        <p id="loginError" class="text-danger mt-2 text-center hidden"></p>
    </div>

    <div id="adminContainer" class="hidden">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>ระบบบันทึกสลิป (Admin)</h2>
            <button class="btn btn-outline-danger" onclick="logout()">ออกจากระบบ</button>
        </div>

        <div id="setupSection" class="card shadow-sm p-4 mx-auto" style="max-width: 600px;">
            <h4 class="mb-3">1. ตั้งค่ารอบการเบิก</h4>
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">ปี</label>
                    <select id="setYear" class="form-select">
                        <option value="2026" selected>2026</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">เดือน</label>
                    <select id="setMonth" class="form-select">
                        <option value="01_Jan">มกราคม (Jan)</option>
                        <option value="02_Feb">กุมภาพันธ์ (Feb)</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">สัปดาห์ที่</label>
                    <select id="setWeek" class="form-select">
                        <option value="Week 1">สัปดาห์ที่ 1</option>
                        <option value="Week 2">สัปดาห์ที่ 2</option>
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">ช่วงวันที่</label>
                    <input type="text" id="setDateRange" class="form-control" placeholder="1-7 ม.ค.">
                </div>
                <div class="col-12 mt-4">
                    <label class="form-label text-danger fw-bold">อัปโหลดสลิป (เลือกได้หลายไฟล์)</label>
                    <input class="form-control" type="file" id="slipFiles" multiple accept="image/*">
                </div>
                <div class="col-12 mt-3">
                    <button class="btn btn-primary w-100" onclick="startImport()">เริ่มทำรายการ</button>
                </div>
            </div>
        </div>

        <div id="processingSection" class="card shadow-sm p-4 mx-auto hidden" style="max-width: 800px;">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="mb-0">2. บันทึกข้อมูลทีละคัน</h4>
                <span id="counterBadge" class="badge bg-secondary fs-6">ใบที่ 0 / 0</span>
            </div>
            <div class="row">
                <div class="col-md-6 text-center mb-3 mb-md-0">
                    <img id="slipImagePreview" class="slip-preview bg-light w-100" src="" alt="Slip Preview">
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">ทะเบียนรถ</label>
                        <input type="text" id="inputPlate" class="form-control" placeholder="กข 1234">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">จำนวนเงิน (บาท)</label>
                        <input type="number" id="inputAmount" class="form-control" value="30">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">วันที่จ่ายจริง</label>
                        <input type="text" id="inputPaymentDate" class="form-control">
                    </div>
                    <button id="saveBtn" class="btn btn-success w-100 mt-3" onclick="saveData()">บันทึก & ถัดไป</button>
                </div>
            </div>
        </div>
    </div>

    <div id="viewerContainer" class="hidden">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>ระบบเรียกดูข้อมูล (Accounting)</h2>
            <button class="btn btn-outline-danger" onclick="logout()">ออกจากระบบ</button>
        </div>
        <div class="card shadow-sm p-4">
            <p>หน้าสำหรับแผนกบัญชีดูข้อมูลและ Export CSV (เดี๋ยวเราจะมาเติมตารางข้อมูลทีหลัง)</p>
            <button class="btn btn-success" onclick="alert('ฟังก์ชัน Export กำลังมา!')">Export CSV</button>
        </div>
    </div>

</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwyCZR0pWSUrHspbIHOnUXVOux3vThqbKu5yOX8uWFPewCjvkuqyFqohFqc_TLTjYwd/exec"; // **อย่าลืมเปลี่ยน URL ใหม่ที่ได้จากการ Deploy ล่าสุด**

    // ตัวแปรส่วน Admin เหมือนเดิม
    let globalSetup = {};
    let slipQueue = [];
    let currentIndex = 0;
    let currentBase64 = "";

    // --- ฟังก์ชัน Login ---
    function doLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const errorMsg = document.getElementById('loginError');

        if(!user || !pass) {
            errorMsg.innerText = "กรุณากรอกข้อมูลให้ครบ";
            errorMsg.classList.remove('hidden');
            return;
        }

        errorMsg.innerText = "กำลังตรวจสอบ...";
        errorMsg.classList.remove('hidden');

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify({ action: 'login', username: user, password: pass })
        })
        .then(response => response.json())
        .then(data => {
            if(data.status === 'success') {
                document.getElementById('loginSection').classList.add('hidden');
                
                // เช็คสิทธิ์
                if(data.role === 'admin') {
                    document.getElementById('adminContainer').classList.remove('hidden');
                } else if(data.role === 'viewer') {
                    document.getElementById('viewerContainer').classList.remove('hidden');
                }
            } else {
                errorMsg.innerText = data.message;
            }
        })
        .catch(err => {
            errorMsg.innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อ";
        });
    }

    function logout() {
        // รีเฟรชหน้าเว็บเพื่อกลับไปหน้า Login
        window.location.reload();
    }

    // --- ฟังก์ชันส่วน Admin (Import Slip) ปรับนิดหน่อยให้ส่ง action ---
    function startImport() {
        const files = document.getElementById('slipFiles').files;
        if (files.length === 0) { alert("กรุณาเลือกไฟล์"); return; }

        globalSetup = {
            year: document.getElementById('setYear').value,
            month: document.getElementById('setMonth').value,
            week: document.getElementById('setWeek').value,
            dateRange: document.getElementById('setDateRange').value,
        };

        slipQueue = Array.from(files);
        currentIndex = 0;

        document.getElementById('setupSection').classList.add('hidden');
        document.getElementById('processingSection').classList.remove('hidden');
        showCurrentSlip();
    }

    function showCurrentSlip() {
        if (currentIndex >= slipQueue.length) {
            alert("เสร็จสิ้น!");
            document.getElementById('processingSection').classList.add('hidden');
            document.getElementById('setupSection').classList.remove('hidden');
            document.getElementById('slipFiles').value = ""; // เคลียร์ไฟล์
            return;
        }

        const file = slipQueue[currentIndex];
        document.getElementById('counterBadge').innerText = `ใบที่ ${currentIndex + 1} / ${slipQueue.length}`;
        document.getElementById('inputPlate').value = "";
        document.getElementById('inputPaymentDate').value = "";
        document.getElementById('saveBtn').innerText = "บันทึก & ถัดไป";
        document.getElementById('saveBtn').disabled = false;

        const reader = new FileReader();
        reader.onload = (e) => {
            currentBase64 = e.target.result;
            document.getElementById('slipImagePreview').src = currentBase64;
        };
        reader.readAsDataURL(file);
    }

    function saveData() {
        const plate = document.getElementById('inputPlate').value;
        const amount = document.getElementById('inputAmount').value;
        const paymentDate = document.getElementById('inputPaymentDate').value;

        if (!plate || !amount || !paymentDate) { alert("กรุณากรอกให้ครบ"); return; }

        const btn = document.getElementById('saveBtn');
        btn.innerText = "กำลังบันทึก...";
        btn.disabled = true;

        const currentFile = slipQueue[currentIndex];

        // เพิ่ม action: 'saveSlip'
        const payload = {
            action: 'saveSlip',
            year: globalSetup.year,
            month: globalSetup.month,
            week: globalSetup.week,
            dateRange: globalSetup.dateRange,
            plate: plate,
            amount: amount,
            paymentDate: paymentDate,
            fileName: currentFile.name,
            mimeType: currentFile.type,
            fileBase64: currentBase64
        };

        fetch(GAS_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
        })
        .then(response => response.json())
        .then(data => {
            if (data.status === "success") {
                currentIndex++;
                showCurrentSlip();
            } else {
                alert("Error: " + data.message);
                btn.innerText = "ลองใหม่";
                btn.disabled = false;
            }
        });
    }
</script>
</body>
</html>
